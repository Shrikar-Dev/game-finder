<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Game Finder</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red: #ff2244;
    --red-dim: #cc1133;
    --red-glow: rgba(255,34,68,0.4);
    --dark: #0a0a0f;
    --dark2: #111118;
    --dark3: #1a1a24;
    --dark4: #222230;
    --text: #e8e8f0;
    --text-dim: #8888aa;
    --border: rgba(255,34,68,0.2);
  }

  body {
    font-family: 'Rajdhani', sans-serif;
    background: var(--dark);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,34,68,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,34,68,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: gridMove 20s linear infinite;
    pointer-events: none;
    z-index: 0;
  }

  @keyframes gridMove {
    0% { transform: translateY(0); }
    100% { transform: translateY(40px); }
  }

  /* Scanline effect */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.05) 2px,
      rgba(0,0,0,0.05) 4px
    );
    pointer-events: none;
    z-index: 0;
  }

  .wrapper { position: relative; z-index: 1; }

  /* Hero */
  .hero {
    text-align: center;
    padding: 4rem 1.5rem 3rem;
    position: relative;
  }

  .hero-eyebrow {
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--red);
    text-transform: uppercase;
    margin-bottom: 1rem;
    animation: fadeDown 0.6s ease forwards;
    opacity: 0;
  }

  .hero h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(2.5rem, 6vw, 5rem);
    font-weight: 900;
    line-height: 1;
    margin-bottom: 1rem;
    animation: fadeDown 0.6s 0.1s ease forwards;
    opacity: 0;
  }

  .hero h1 span {
    color: var(--red);
    text-shadow: 0 0 30px var(--red-glow), 0 0 60px var(--red-glow);
  }

  .hero p {
    font-size: 1.1rem;
    color: var(--text-dim);
    max-width: 480px;
    margin: 0 auto;
    animation: fadeDown 0.6s 0.2s ease forwards;
    opacity: 0;
  }

  /* Red line accent */
  .hero-line {
    width: 60px;
    height: 3px;
    background: var(--red);
    margin: 1.5rem auto;
    box-shadow: 0 0 12px var(--red-glow);
    animation: expandLine 0.8s 0.3s ease forwards;
    transform: scaleX(0);
  }

  @keyframes expandLine {
    to { transform: scaleX(1); }
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Quiz */
  .quiz {
    max-width: 620px;
    margin: 0 auto;
    padding: 0 1.5rem 3rem;
  }

  .step {
    background: var(--dark2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
    margin-bottom: 1rem;
    animation: fadeUp 0.5s ease forwards;
    opacity: 0;
    position: relative;
    overflow: hidden;
  }

  .step::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px; height: 100%;
    background: var(--red);
    box-shadow: 0 0 12px var(--red-glow);
  }

  .step:nth-child(1) { animation-delay: 0.3s; }
  .step:nth-child(2) { animation-delay: 0.4s; }
  .step:nth-child(3) { animation-delay: 0.5s; }
  .step:nth-child(4) { animation-delay: 0.6s; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .step label {
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--red);
    text-transform: uppercase;
    display: block;
    margin-bottom: 12px;
  }

  .options {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .opt {
    padding: 8px 18px;
    border-radius: 6px;
    border: 1px solid var(--dark4);
    background: var(--dark3);
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: all 0.2s;
    color: var(--text-dim);
    position: relative;
    overflow: hidden;
  }

  .opt::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--red);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .opt:hover {
    border-color: var(--red);
    color: var(--text);
    transform: translateY(-1px);
  }

  .opt.active {
    border-color: var(--red);
    background: rgba(255,34,68,0.15);
    color: var(--red);
    box-shadow: 0 0 16px var(--red-glow);
  }

  /* Find button */
  .find-btn {
    width: 100%;
    padding: 16px;
    font-family: 'Orbitron', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    background: var(--red);
    color: #fff;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    margin-top: 0.5rem;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
    box-shadow: 0 0 24px var(--red-glow);
    animation: fadeUp 0.5s 0.7s ease forwards;
    opacity: 0;
  }

  .find-btn::after {
    content: '';
    position: absolute;
    top: -50%; left: -60%;
    width: 40%; height: 200%;
    background: rgba(255,255,255,0.15);
    transform: skewX(-20deg);
    transition: left 0.4s;
  }

  .find-btn:hover { transform: translateY(-2px); box-shadow: 0 0 40px var(--red-glow); }
  .find-btn:hover::after { left: 120%; }
  .find-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* Loading */
  .loading {
    text-align: center;
    padding: 4rem 1.5rem;
    display: none;
  }

  .loading-icon {
    width: 60px; height: 60px;
    border: 3px solid var(--dark4);
    border-top-color: var(--red);
    border-radius: 50%;
    margin: 0 auto 1.5rem;
    animation: spin 0.8s linear infinite;
    box-shadow: 0 0 20px var(--red-glow);
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading p {
    font-family: 'Orbitron', sans-serif;
    font-size: 12px;
    letter-spacing: 3px;
    color: var(--red);
    text-transform: uppercase;
    animation: pulse 1.5s ease-in-out infinite;
  }

  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

  /* Results */
  .results {
    max-width: 1000px;
    margin: 0 auto;
    padding: 0 1.5rem 4rem;
    display: none;
  }

  .results-header {
    text-align: center;
    margin-bottom: 2rem;
  }

  .results-header h2 {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.4rem;
    font-weight: 700;
    margin-bottom: 6px;
  }

  .results-header h2 span { color: var(--red); }

  .results-header p {
    font-size: 14px;
    color: var(--text-dim);
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
    margin-bottom: 2rem;
  }

  .card {
    background: var(--dark2);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: all 0.3s;
    animation: fadeUp 0.5s ease forwards;
    opacity: 0;
    position: relative;
  }

  .card:hover {
    transform: translateY(-4px);
    border-color: var(--red);
    box-shadow: 0 8px 32px var(--red-glow);
  }

  .card-img-wrap {
    position: relative;
    height: 160px;
    overflow: hidden;
    background: var(--dark3);
  }

  .card-img-wrap img {
    width: 100%; height: 100%;
    object-fit: cover;
    transition: transform 0.4s;
  }

  .card:hover .card-img-wrap img { transform: scale(1.05); }

  .card-img-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, var(--dark2) 0%, transparent 60%);
  }

  .card-body { padding: 1rem 1.1rem 1.1rem; }

  .card-name {
    font-family: 'Orbitron', sans-serif;
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 8px;
    line-height: 1.3;
  }

  .card-meta {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 10px;
  }

  .badge {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 4px;
    letter-spacing: 0.5px;
  }

  .badge-rating {
    background: rgba(255,34,68,0.15);
    color: var(--red);
    border: 1px solid rgba(255,34,68,0.3);
  }

  .badge-year {
    background: var(--dark3);
    color: var(--text-dim);
    border: 1px solid var(--dark4);
  }

  .card-reason {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.6;
    margin-bottom: 12px;
    border-left: 2px solid var(--red);
    padding-left: 10px;
  }

  .links { display: flex; gap: 8px; }

  .link-btn {
    flex: 1;
    padding: 8px;
    text-align: center;
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1px;
    border-radius: 6px;
    border: 1px solid var(--dark4);
    text-decoration: none;
    color: var(--text-dim);
    background: var(--dark3);
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .link-btn:hover {
    border-color: var(--red);
    color: var(--red);
    background: rgba(255,34,68,0.08);
  }

  /* Try again button */
  .try-again {
    display: block;
    margin: 0 auto;
    padding: 12px 32px;
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    border: 1px solid var(--red);
    background: transparent;
    color: var(--red);
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .try-again:hover {
    background: rgba(255,34,68,0.1);
    box-shadow: 0 0 20px var(--red-glow);
  }

  /* Error */
  .error-msg {
    text-align: center;
    padding: 1rem;
    color: var(--red);
    font-size: 14px;
    display: none;
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    letter-spacing: 1px;
  }

  /* No results */
  .no-results {
    text-align: center;
    padding: 3rem;
    color: var(--text-dim);
    font-family: 'Orbitron', sans-serif;
    font-size: 12px;
    letter-spacing: 2px;
  }

  /* Stagger cards */
  .card:nth-child(1) { animation-delay: 0.1s; }
  .card:nth-child(2) { animation-delay: 0.2s; }
  .card:nth-child(3) { animation-delay: 0.3s; }
  .card:nth-child(4) { animation-delay: 0.4s; }
  .card:nth-child(5) { animation-delay: 0.5s; }
  .card:nth-child(6) { animation-delay: 0.6s; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--dark); }
  ::-webkit-scrollbar-thumb { background: var(--red-dim); border-radius: 3px; }
</style>
</head>
<body>
<div class="wrapper">

  <div class="hero">
    
    <h1>GAME<br><span>FINDER</span></h1>
    <div class="hero-line"></div>
    <p>Answer 4 questions. Get your perfect game recommendations from Steam & Epic.</p>
  </div>

  <div class="quiz" id="quiz">
    <div class="step">
      <label>What genre do you enjoy?</label>
      <div class="options" id="genre">
        <button class="opt" data-val="action">Action</button>
        <button class="opt" data-val="rpg">RPG</button>
        <button class="opt" data-val="horror">Horror</button>
        <button class="opt" data-val="shooter">Shooter</button>
        <button class="opt" data-val="adventure">Adventure</button>
        <button class="opt" data-val="puzzle">Puzzle</button>
        <button class="opt" data-val="sports">Sports</button>
        <button class="opt" data-val="strategy">Strategy</button>
      </div>
    </div>

    <div class="step">
      <label>How do you like to play?</label>
      <div class="options" id="playStyle">
        <button class="opt" data-val="singleplayer">Single player</button>
        <button class="opt" data-val="multiplayer">Multiplayer</button>
        <button class="opt" data-val="both">Both</button>
      </div>
    </div>

    <div class="step">
      <label>What's your budget?</label>
      <div class="options" id="budget">
        <button class="opt" data-val="free">Free only</button>
        <button class="opt" data-val="paid">Happy to pay</button>
        <button class="opt" data-val="any">Any</button>
      </div>
    </div>

    <div class="step">
      <label>How powerful is your PC?</label>
      <div class="options" id="specs">
        <button class="opt" data-val="low">Low-end</button>
        <button class="opt" data-val="mid">Mid-range</button>
        <button class="opt" data-val="high">High-end</button>
      </div>
    </div>

    <button class="find-btn" id="findBtn" onclick="findGames()">Find My Games</button>
  </div>

  <div class="loading" id="loading">
    <div class="loading-icon"></div>
    <p>Scanning the game universe...</p>
  </div>

  <div class="error-msg" id="errorMsg"></div>

  <div class="results" id="results">
    <div class="results-header">
      <h2 id="resultsTitle">Games <span>picked for you</span></h2>
      <p>Based on your preferences — available on Steam & Epic Games</p>
    </div>
    <div class="grid" id="grid"></div>
    <button class="try-again" onclick="tryAgain()">Search Again</button>
  </div>

</div>

<script>
const selections = { genre: '', playStyle: '', budget: '', specs: '' };

document.querySelectorAll('.options').forEach(group => {
  group.querySelectorAll('.opt').forEach(btn => {
    btn.addEventListener('click', () => {
      group.querySelectorAll('.opt').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selections[group.id] = btn.dataset.val;
    });
  });
});

function tryAgain() {
  document.getElementById('results').style.display = 'none';
  document.getElementById('quiz').style.display = 'block';
  document.getElementById('errorMsg').style.display = 'none';
  document.querySelectorAll('.opt').forEach(b => b.classList.remove('active'));
  Object.keys(selections).forEach(k => selections[k] = '');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

async function findGames() {
  if (!selections.genre || !selections.playStyle || !selections.budget || !selections.specs) {
    alert('Please answer all 4 questions first!');
    return;
  }

  document.getElementById('quiz').style.display = 'none';
  document.getElementById('loading').style.display = 'block';
  document.getElementById('results').style.display = 'none';
  document.getElementById('errorMsg').style.display = 'none';

  try {
    const res = await fetch('/api/recommend', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(selections)
    });

    const data = await res.json();
    if (data.error) throw new Error(data.error);

    document.getElementById('loading').style.display = 'none';
    document.getElementById('results').style.display = 'block';

    if (!data.games || data.games.length === 0) {
      document.getElementById('grid').innerHTML = '<div class="no-results">No games found — try different filters</div>';
      return;
    }

    document.getElementById('resultsTitle').innerHTML = `<span>${data.games.length} Games</span> Found For You`;

    const grid = document.getElementById('grid');
    grid.innerHTML = '';

    data.games.forEach(game => {
      grid.innerHTML += `
        <div class="card">
          <div class="card-img-wrap">
            ${game.image ? `<img src="${game.image}" alt="${game.name}" onerror="this.parentElement.style.background='#1a1a24'" />` : ''}
            <div class="card-img-overlay"></div>
          </div>
          <div class="card-body">
            <div class="card-name">${game.name}</div>
            <div class="card-meta">
              <span class="badge badge-rating">★ ${game.rating}/5</span>
              <span class="badge badge-year">${game.released?.split('-')[0] || 'N/A'}</span>
            </div>
            <div class="card-reason">${game.reason}</div>
            <div class="links">
              <a href="${game.steam_url}" target="_blank" class="link-btn">Steam</a>
              <a href="${game.epic_url}" target="_blank" class="link-btn">Epic</a>
            </div>
          </div>
        </div>`;
    });

    window.scrollTo({ top: 0, behavior: 'smooth' });

  } catch (err) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('errorMsg').style.display = 'block';
    document.getElementById('errorMsg').textContent = 'Error: ' + err.message;
    document.getElementById('quiz').style.display = 'block';
  }
}
</script>
</body>
</html>
